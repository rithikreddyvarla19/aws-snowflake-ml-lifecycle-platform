services:
  churn-api:
    build: .
    environment:
      MODEL_PATH: /app/artifacts/models/churn_random_forest.joblib
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/artifacts

  dashboard:
    build: .
    command: streamlit run dashboards/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./artifacts:/app/artifacts
      - ./dashboards:/app/dashboards

